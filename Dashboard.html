<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Exercises</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-400 text-gray-100">
<div class="max-w-5xl mx-auto p-10 space-y-20">


    <!-- Exercise 20 -->
    <div class="min-h-screen bg-gray-700">
        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:block h-screen w-64 fixed left-0 top-0 bg-gray-700 shadow-lg">
            <div class="p-6 font-bold text-xl border-b">Sidebar</div>
            <nav class="p-4 space-y-2">
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Dashboard</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Login</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Gallery</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Product</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Studio</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Settings</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Events</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Creativity</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Pricing</a>
                <a href="#" class="block p-2 rounded hover:bg-gray-200">Contact</a>
            </nav>
        </aside>

        <!-- Top Header -->
        <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b border-gray-200 px-6 h-14 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2">
                <img src="logotyp.jpg" alt="Logo" class="h-12 w-auto">
                <h5 class="text-gray-500 text-sm">Simple Navigation Bar</h5>
            </a>
            <div class="flex items-center gap-1">
                <a href="#"
                   class="text-sm text-gray-500 px-3 py-1.5 rounded-md hover:text-blue-500 hover:bg-gray-100 transition-colors">Home</a>
                <a href="#"
                   class="text-sm text-gray-500 px-3 py-1.5 rounded-md hover:text-blue-500 hover:bg-gray-100 transition-colors">PhotoGallery</a>
                <a href="#"
                   class="text-sm text-gray-500 px-3 py-1.5 rounded-md hover:text-blue-500 hover:bg-gray-100 transition-colors">Consultation</a>
                <a href="#"
                   class="text-sm text-gray-500 px-3 py-1.5 rounded-md hover:text-blue-500 hover:bg-gray-100 transition-colors">About</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="pt-20 md:ml-64 p-8 bg-trasparant">
            <div class="relative z-10 text-center text-white px-8">
                <h1 class="text-2xl font-bold mb-4">Main Content</h1>
                <p class="text-lg text-white/70 mb-8">Your dashboard content goes here.</p>
                <a href="#" class="border border-white/40 px-6 py-2.5 rounded-md hover:bg-white/10 transition-colors">
                    Get Started!
                </a>
            </div>
        </main>

        <!-- Bottom Nav (Mobile Only) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white shadow-inner flex justify-around items-center">
            <button class="flex flex-col items-center">
                <span class="text-sm">Home</span>
            </button>
            <button class="flex flex-col items-center">
                <span class="text-sm">Search</span>
            </button>
            <button class="flex flex-col items-center">
                <span class="text-sm">Profile</span>
            </button>
        </nav>

    </div>



</div>
</body>
</html>
