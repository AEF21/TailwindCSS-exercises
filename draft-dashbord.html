<!DOCTYPE html>
<html lang="en">
<head>

    <title>Tailwind CSS Exercises</title>

</head>
<body class="bg-slate-100 text-slate-800">
<div class="max-w-5xl mx-auto p-10 space-y-20">

    <!-- Exercise 20 -->
    <div class="min-h-screen bg-slate-100">

        <!-- Sidebar (Desktop) -->

                      bg-slate-800 text-slate-100 shadow-lg">
            <div class="p-6 font-bold text-xl border-b border-slate-700 text-white">
                Sidebar
            </div>
            <nav class="p-4 space-y-1">
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Dashboard</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Login</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Gallery</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Product</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Studio</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Settings</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Events</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Creativity</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Pricing</a>
                <a href="#" class="block p-2 rounded text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Contact</a>
            </nav>
        </aside>

        <!-- Top Header -->
        <!-- Top Header -->
        <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/80
            border-b border-slate-200 px-6 h-14
            flex items-center justify-between">
            <a href="#" class="flex items-center gap-2">
                <img src="logotyp.jpg" alt="Logo" class="h-12 w-auto">
                <h5 class="text-slate-400 text-sm">Simple Navigation Bar</h5>
            </a>

            <!-- Länkar -->
            <div class="flex items-center gap-1">
                <a href="#" class="text-sm text-slate-500 px-3 py-1.5 rounded-md
                           hover:text-slate-800 hover:bg-slate-100 transition-colors">Home</a>
                <a href="#" class="text-sm text-slate-500 px-3 py-1.5 rounded-md
                           hover:text-slate-800 hover:bg-slate-100 transition-colors">PhotoGallery</a>
                <a href="#" class="text-sm text-slate-500 px-3 py-1.5 rounded-md
                           hover:text-slate-800 hover:bg-slate-100 transition-colors">Consultation</a>
                <a href="#" class="text-sm text-slate-500 px-3 py-1.5 rounded-md
                           hover:text-slate-800 hover:bg-slate-100 transition-colors">About</a>
            </div>

            <!-- Sökruta -->
            <div class="flex items-center gap-2 bg-slate-100 border border-slate-200
                rounded-md px-3 py-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                </svg>
                <input type="search"
                       placeholder="Search..."
                       class="bg-transparent text-sm text-slate-700
                      placeholder:text-slate-400
                      outline-none w-40">
            </div>

        </nav>
    </div>

</html>
